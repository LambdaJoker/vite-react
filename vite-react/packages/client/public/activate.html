<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>腕上人生 - 激活</title>
  <script>
    (function () {
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      var target = '/activate' + search + hash;
      if (search.indexOf('tab=search') >= 0) {
        target = '/activate/search' + search + hash;
      }
      window.location.replace(target);
    })();
  </script>
</head>
<body></body>
</html>
