<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Node article cover</title>
  <desc id="desc">A backend concurrency architecture themed illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="158" y="118" width="884" height="404" rx="34" fill="#fff" opacity="0.9"/>
    <rect x="266" y="226" width="190" height="188" rx="28" fill="#16a34a"/>
    <rect x="506" y="182" width="190" height="276" rx="28" fill="#15803d"/>
    <rect x="746" y="226" width="190" height="188" rx="28" fill="#22c55e"/>
    <path d="M456 320h50M696 320h50" stroke="#86efac" stroke-width="18" stroke-linecap="round"/>
    <g fill="#fff" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">
      <text x="361" y="332">API</text>
      <text x="601" y="332">NODE</text>
      <text x="841" y="332">DB</text>
    </g>
  </g>
  <text x="144" y="594" fill="#166534" font-family="Arial, sans-serif" font-size="34" font-weight="700">NODE ARCHITECTURE</text>
</svg>
