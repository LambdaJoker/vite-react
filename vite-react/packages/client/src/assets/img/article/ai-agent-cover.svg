<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent cover</title>
  <desc id="desc">An agent loop with thought, action, and observation nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#312e81" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="150" y="106" width="900" height="428" rx="36" fill="#fff" opacity="0.92"/>
    <circle cx="600" cy="320" r="92" fill="#4f46e5"/>
    <path d="M600 180c112 0 202 58 240 140M826 298l16 44 38-28M600 460c-112 0-202-58-240-140M374 342l-16-44-38 28" fill="none" stroke="#93c5fd" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="240" y="266" width="190" height="108" rx="26" fill="#eef2ff"/>
    <rect x="770" y="266" width="190" height="108" rx="26" fill="#ecfeff"/>
    <text x="600" y="332" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Agent</text>
    <text x="335" y="329" text-anchor="middle" fill="#312e81" font-family="Arial, sans-serif" font-size="28" font-weight="700">Think</text>
    <text x="865" y="329" text-anchor="middle" fill="#155e75" font-family="Arial, sans-serif" font-size="28" font-weight="700">Act</text>
  </g>
  <text x="144" y="594" fill="#312e81" font-family="Arial, sans-serif" font-size="34" font-weight="700">AGENT LOOP</text>
</svg>
