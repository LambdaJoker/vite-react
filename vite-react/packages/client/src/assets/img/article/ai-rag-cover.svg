<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">RAG cover</title>
  <desc id="desc">A retrieval augmented generation pipeline illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#164e63" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="150" y="108" width="900" height="424" rx="36" fill="#fff" opacity="0.92"/>
    <rect x="220" y="238" width="190" height="164" rx="28" fill="#cffafe"/>
    <rect x="505" y="238" width="190" height="164" rx="28" fill="#dcfce7"/>
    <rect x="790" y="238" width="190" height="164" rx="28" fill="#dbeafe"/>
    <path d="M410 320h95M695 320h95" stroke="#0891b2" stroke-width="16" stroke-linecap="round"/>
    <path d="M482 292l32 28-32 28M767 292l32 28-32 28" fill="none" stroke="#0891b2" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#164e63" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">
      <text x="315" y="330" font-size="28">Retrieve</text>
      <text x="600" y="330" font-size="28">Augment</text>
      <text x="885" y="330" font-size="28">Generate</text>
    </g>
  </g>
  <text x="144" y="594" fill="#164e63" font-family="Arial, sans-serif" font-size="34" font-weight="700">RAG PIPELINE</text>
</svg>
