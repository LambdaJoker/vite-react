<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Context engineering cover</title>
  <desc id="desc">A context window with selected memories, tools, and documents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#78350f" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="154" y="106" width="892" height="428" rx="36" fill="#fff" opacity="0.92"/>
    <rect x="236" y="176" width="728" height="288" rx="24" fill="#fffbeb"/>
    <rect x="270" y="214" width="196" height="58" rx="18" fill="#fde68a"/>
    <rect x="502" y="214" width="158" height="58" rx="18" fill="#bfdbfe"/>
    <rect x="696" y="214" width="220" height="58" rx="18" fill="#bbf7d0"/>
    <rect x="270" y="316" width="646" height="22" rx="11" fill="#cbd5e1"/>
    <rect x="270" y="364" width="540" height="22" rx="11" fill="#cbd5e1"/>
    <rect x="270" y="412" width="430" height="22" rx="11" fill="#cbd5e1"/>
    <text x="600" y="502" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="28" font-weight="700">select · compress · organize</text>
  </g>
  <text x="144" y="594" fill="#78350f" font-family="Arial, sans-serif" font-size="34" font-weight="700">CONTEXT ENGINEERING</text>
</svg>
