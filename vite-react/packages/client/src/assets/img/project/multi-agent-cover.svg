<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Multi-agent project cover</title>
  <desc id="desc">A network of cooperating software agents connected across a planning canvas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecf4ff"/>
      <stop offset="0.58" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#f1e9ff"/>
    </linearGradient>
    <linearGradient id="node" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#26315f" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <path d="M170 470C300 320 404 370 518 238s246-90 340 12 142 112 244 36" fill="none" stroke="#b8c7ff" stroke-width="24" stroke-linecap="round" opacity="0.45"/>
  <g filter="url(#shadow)">
    <rect x="164" y="116" width="872" height="408" rx="34" fill="#ffffff" opacity="0.9"/>
    <path d="M342 322h220M638 322h220M448 250l114 72M448 394l114-72M752 250l-114 72M752 394l-114-72" stroke="#8aa2d6" stroke-width="10" stroke-linecap="round"/>
    <g fill="url(#node)">
      <circle cx="342" cy="322" r="62"/>
      <circle cx="600" cy="322" r="78"/>
      <circle cx="858" cy="322" r="62"/>
      <circle cx="448" cy="250" r="48"/>
      <circle cx="448" cy="394" r="48"/>
      <circle cx="752" cy="250" r="48"/>
      <circle cx="752" cy="394" r="48"/>
    </g>
    <g fill="#ffffff" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">
      <text x="342" y="332" font-size="22">PLAN</text>
      <text x="600" y="333" font-size="26">AGENT</text>
      <text x="858" y="332" font-size="22">CHECK</text>
      <text x="448" y="258" font-size="18">CODE</text>
      <text x="448" y="402" font-size="18">TEST</text>
      <text x="752" y="258" font-size="18">MEM</text>
      <text x="752" y="402" font-size="18">FIX</text>
